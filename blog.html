    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --blue: #00acda; --red: #ff0000; --green-light: #8ab432; --green-dark: #3cb094;
            --dark: #121212; --dark-card: #1e1e1e;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: white; overflow-x: hidden; }

        .navbar { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--blue); padding: 10px 0; }
        .nav-link { color: white !important; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .nav-link:hover, .nav-link.active { color: var(--green-light) !important; }

        .page-hero { padding: 120px 0 60px 0; background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0.8) 100%); border-bottom: 2px solid rgba(255,255,255,0.05); text-align: center; }
        .page-hero h1 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; }
        .page-hero h1 span { color: var(--blue); text-shadow: 2px 2px 0 var(--red); }

        .post-card { background: var(--dark-card); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.05); }
        
        .swiper { width: 100%; height: 450px; background: #000; }
        @media (max-width: 768px) { .swiper { height: 300px; } }

        .swiper-slide { display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .slide-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(15px) brightness(0.4); transform: scale(1.1); z-index: 1; }
        .post-img-full { position: relative; z-index: 2; max-width: 100%; max-height: 100%; object-fit: contain; }

        .post-content { padding: 30px; }
        .post-date { color: var(--blue); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
        .post-title { font-size: 1.8rem; font-weight: 900; margin: 10px 0; text-transform: uppercase; }
        .res-item { background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-left: 4px solid var(--green-light); margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 0.95rem; }

        footer { border-top: 2px solid var(--green-dark); padding: 50px 0; background: #080808; margin-top: 60px;}
        .social-icon { font-size: 24px; margin: 0 15px; color: var(--blue); text-decoration: none; display: inline-block;}
        .social-icon:hover { color: var(--red); transform: scale(1.2); }

        /* Agit directement sur le widget Behold */
    behold-widget {
    display: block;
    width: 100%;
    max-width: 5000px; /* Tu peux augmenter ce chiffre pour élargir */
    margin: 0 auto;
}
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        var swiper = new Swiper(".mySwiper", {
            loop: true,
