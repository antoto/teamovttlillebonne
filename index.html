<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif VTT Lillebonne | Team DN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --blue: #00acda; --red: #ff0000; --green-light: #8ab432; --green-dark: #3cb094;
            --dark: #121212;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: white; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-bottom: 2px solid var(--blue); padding: 10px 0; }
        .nav-link { color: white !important; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .nav-link:hover, .nav-link.active { color: var(--green-light) !important; }

        /* Hero */
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('photo-groupe.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; text-shadow: 3px 3px var(--red); line-height: 1.1; }
        
        .btn-custom { background: linear-gradient(45deg, var(--blue), var(--green-dark)); border: none; color: white; padding: 15px 35px; border-radius: 50px; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 0.9rem; }
        .btn-custom:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--blue); color: white; }

        /* Footer */
        footer { border-top: 2px solid var(--green-dark); padding: 50px 0; background: #080808; margin-top: 60px;}
        .social-icon { font-size: 24px; margin: 0 15px; color: var(--blue); transition: 0.3s ease; text-decoration: none; display: inline-block;}
        .social-icon:hover { color: var(--red); transform: scale(1.2); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="Logo_OVTT.png" height="50" alt="Logo"></a>
            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav text-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipe.html">L'Équipe</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Actualités</a></li>
                    <li class="nav-item"><a class="nav-link" href="partenaires.html">Partenaires</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container" data-aos="zoom-in">
            <h1 class="mb-3">TEAM DIVISION NATIONALE</h1>
            <p class="lead mb-4">L'excellence du VTT à Lillebonne</p>
            <a href="blog.html" class="btn btn-custom">VOIR LES RÉSULTATS</a>
        </div>
    </section>

    <section class="py-5">
        <div class="container text-center" data-aos="fade-up">
            <h2 class="mb-5" style="font-weight: 900; text-transform: uppercase;">Suivez nous sur <span style="color: #E1306C;">Instagram</span></h2>
            
            <div class="my-4">
                <behold-widget feed-id="iFGBBYhJC293TdzsL9ew"></behold-widget>
                <script type="module" src="https://w.behold.so/widget.js"></script>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <a href="index.html"><img src="Logo_OVTT.png" height="50" alt="OVTT" class="mb-4"></a>
            <div class="mb-4">
                <a href="https://www.instagram.com/teamovttlillebonne/?__pwa=1" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/profile.php?id=100057587674176" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            </div>
            <p class="small text-muted">&copy; 2026 Objectif VTT Lillebonne.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
